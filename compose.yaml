name: ja-media-services

services:
  docs:
    build:
      context: .
      dockerfile: site/Dockerfile
    image: ja-media/docs:local
    ports:
      - "${DOCS_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      anime-crosswalk:
        condition: service_healthy
      kitsunekko-subtitles:
        condition: service_healthy

  anime-crosswalk:
    build:
      context: .
      dockerfile: envs/services/Dockerfile
    image: ja-media/services:local
    restart: unless-stopped
    environment:
      ANIME_CROSSWALK_HOST: "0.0.0.0"
      ANIME_CROSSWALK_PORT: "8000"
      ANIME_CROSSWALK_DB_PATH: "/var/lib/anime-crosswalk/anime_lists.sqlite"
      ANIME_CROSSWALK_DATA_DIR: "/var/lib/anime-crosswalk"
      ANIME_CROSSWALK_SOURCE_JSON_PATH: "/var/lib/anime-crosswalk/anime-lists/anime-list-full.json"
      ANIME_CROSSWALK_UPSTREAM_REPO_URL: "https://github.com/Fribb/anime-lists.git"
      ANIME_CROSSWALK_UPSTREAM_REPO_NAME: "Fribb/anime-lists"
      ANIME_CROSSWALK_UPSTREAM_BRANCH: "master"
      ANIME_CROSSWALK_UPDATE_INTERVAL_SECONDS: "43200"
    volumes:
      - anime-crosswalk-data:/var/lib/anime-crosswalk
    healthcheck:
      test: ["CMD-SHELL", "uv run --no-sync anime-crosswalk-smoke \"$${ANIME_CROSSWALK_DB_PATH}\" >/dev/null"]
      interval: 1m
      timeout: 20s
      retries: 3
      start_period: 1m

  kitsunekko-subtitles:
    build:
      context: .
      dockerfile: envs/services/Dockerfile
    image: ja-media/services:local
    restart: unless-stopped
    environment:
      KITSUNEKKO_SUBTITLES_HOST: "0.0.0.0"
      KITSUNEKKO_SUBTITLES_PORT: "8000"
      KITSUNEKKO_SUBTITLES_DATA_DIR: "/var/lib/kitsunekko-subtitles"
      KITSUNEKKO_SUBTITLES_DB_PATH: "/var/lib/kitsunekko-subtitles/kitsunekko_subtitles.sqlite"
      KITSUNEKKO_SUBTITLES_CROSSWALK_DB_PATH: "/var/lib/anime-crosswalk-ro/anime_lists.sqlite"
      KITSUNEKKO_SUBTITLES_MIRROR_DIR: "/var/lib/kitsunekko-subtitles/kitsunekko-mirror"
      KITSUNEKKO_SUBTITLES_UPSTREAM_REPO_URL: "https://github.com/Ajatt-Tools/kitsunekko-mirror.git"
      KITSUNEKKO_SUBTITLES_UPSTREAM_REPO_NAME: "Ajatt-Tools/kitsunekko-mirror"
      KITSUNEKKO_SUBTITLES_UPSTREAM_BRANCH: "main"
      KITSUNEKKO_SUBTITLES_UPDATE_INTERVAL_SECONDS: "${KITSUNEKKO_SUBTITLES_UPDATE_INTERVAL_SECONDS:-3600}"
    volumes:
      - kitsunekko-subtitles-data:/var/lib/kitsunekko-subtitles
      - anime-crosswalk-data:/var/lib/anime-crosswalk-ro:ro
    depends_on:
      anime-crosswalk:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run --no-sync kitsunekko-subtitles-smoke \"$${KITSUNEKKO_SUBTITLES_DB_PATH}\" >/dev/null"]
      interval: 1m
      timeout: 20s
      retries: 3
      start_period: 1m
    command: ["uv", "run", "--no-sync", "kitsunekko-subtitles"]

volumes:
  anime-crosswalk-data:
  kitsunekko-subtitles-data:
