[project]
name = "ja-media-frontend"
version = "0.1.0"
description = "Shared command-line frontend for ja-media-toolkit"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.136.3",
    "httpx>=0.28,<1",
    "ja-media-core>=0.1.0",
    "numpy",
    "parse-torrent-title>=2.8.2",
    "pydantic>=2.13.4",
    "python-dotenv>=1.2.2",
    "sounddevice>=0.5.5",
    "textual>=8.2.7",
    "uvicorn>=0.49.0",
]

[project.optional-dependencies]
apple = [
    "ja-media-apple>=0.1.0",
]

[project.scripts]
ja-media = "ja_media_frontend.cli:main"
ja-media-srt-clean = "ja_media_frontend.srt_clean:main"
srt_clean_vllm_batch = "ja_media_frontend.srt_cleaning.vllm_batch:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
ja-media-core = { path = "../core", editable = true }
ja-media-apple = { path = "../../envs/apple", editable = true }

[dependency-groups]
dev = [
    "pytest>=9.1.0",
]
