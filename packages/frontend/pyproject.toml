[project]
name = "ja-media-frontend"
version = "0.1.0"
description = "Shared command-line frontend for ja-media-toolkit"
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
apple = [
    "ja-media-apple",
]

[project.scripts]
ja-media = "ja_media_frontend.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
ja-media-apple = { path = "../../envs/apple", editable = true }
